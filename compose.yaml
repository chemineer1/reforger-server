name: reforger-server

services:
  reforger:
    build:
      context: .
      dockerfile: Dockerfile
    image: reforger-server:local
    # Use Docker's built-in init wrapper instead of baking tini into the image.
    init: true
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      # Stable Arma Reforger dedicated server app ID.
      STEAM_APP_ID: "1874900"
      STEAM_BRANCH: public
      # Set to "1" when you need SteamCMD to verify all server files.
      STEAM_VALIDATE: "0"
      SERVER_MAX_FPS: "60"
      CONFIG_FILE: /home/steam/configs/server.json
    ports:
      # Game traffic, Steam A2S query, and optional RCON.
      - target: 2001
        published: "2001"
        protocol: udp
      - target: 17777
        published: "17777"
        protocol: udp
      - target: 19999
        published: "19999"
        protocol: udp
    volumes:
      # Keep downloaded server files and generated profile data outside the
      # container lifecycle.
      - reforger-server:/home/steam/reforger
      - reforger-profile:/home/steam/profile
      # Server configuration lives in the repo and is mounted read-only.
      - type: bind
        source: ./config
        target: /home/steam/configs
        read_only: true

volumes:
  reforger-server:
  reforger-profile:
