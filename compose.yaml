name: reforger

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: reforger-server:local
    # Use Docker's built-in init wrapper instead of baking tini into the image.
    init: true
    # Retry transient failures and daemon/host restarts, but respect manual stops.
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      # Stable Arma Reforger dedicated server app ID.
      STEAM_APP_ID: "1874900"
      STEAM_BRANCH: public
      # 'missing' installs only when the server files are absent. Use 'always' when intentionally updating.
      STEAM_UPDATE_ON_START: missing
      # Set to "1" when you need SteamCMD to verify all server files.
      STEAM_VALIDATE: "0"
      SERVER_MAX_FPS: "60"
      CONFIG_FILE: /run/configs/reforger-server.json
    ports:
      # Game traffic, Steam A2S query, and optional RCON.
      - target: 2001
        published: "2001"
        protocol: udp
      - target: 17777
        published: "17777"
        protocol: udp
      - target: 19999
        published: "19999"
        protocol: udp
    volumes:
      # Mutable runtime state. These survive container rebuilds/recreates.
      - server-files:/home/steam/reforger
      - profile:/home/steam/profile
    configs:
      - source: reforger_server_config
        target: /run/configs/reforger-server.json

volumes:
  server-files:
  profile:

configs:
  reforger_server_config:
    file: ./config/config.json
